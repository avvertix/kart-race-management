name: Build Docker Image

on: 
  push:
    branches: 
      - "main"
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'docker/**'
      - 'Dockerfile'
      - '.dockerignore'
      - 'package-lock.json'
      - 'package.json'
      - 'composer.json'
      - 'composer.lock'
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  COMMIT_SHA: ${{github.sha}}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0
      with:
        fetch-depth: 1

    - name: Log in to the Container registry
      uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}


    - name: Build and push Docker image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        build-args: |
          BUILD_COMMIT=$COMMIT_SHA
          BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
