name: CI

on: 
  push:
    branches: 
      - "main"
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  phpunit:
    name: Tests PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    container: 
      image: klinktechnology/k-box-ci-pipeline-php:${{ matrix.php }}
      options: --user root 

    services:
      mariadb:
        image: mariadb:10.11.14
        env:
          MARIADB_DATABASE: testing
          MARIADB_USER: forge
          MARIADB_PASSWORD: forge
          MARIADB_ALLOW_EMPTY_ROOT_PASSWORD: yes
          MARIADB_INITDB_SKIP_TZINFO: 1
        ports:
          - 3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    strategy:
      fail-fast: true
      matrix:
        php: [8.4]
    
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0
      with:
        fetch-depth: 1
    
    - name: Cache dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1
      with:
        path: /home/php/.composer/cache
        key: dependencies-php-${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}

    - name: Cache JS dependencies
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1
      with:
        path: ~/.npm
        key: dependencies-js-${{ matrix.php }}-npm-${{ hashFiles('package-lock.json') }}

    - name: Prepare environment
      run: |
        rm -f /usr/local/etc/php/conf.d/docker-php-ext-pcov.ini
        composer install --prefer-dist
        npm ci
        npm run build
        
    - name: Run Testsuite
      env:
        DB_HOST: mariadb
        DB_PASSWORD: forge
      run: |
        echo "APP_KEY=" > .env
        php artisan key:generate
        php artisan view:clear
        php artisan config:clear
        php artisan route:clear
        vendor/bin/phpunit
